name: Stage Release

on:
  repository_dispatch:
    types:
      - source-release
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      auto_discover:
        description: "Discover the next pending source tag automatically"
        required: false
        default: false
        type: boolean
      source_repo:
        description: "Private source repository"
        required: false
        default: "openelf-labs/openelf"
        type: string
      source_tag:
        description: "Release tag to publish, e.g. v0.2.0"
        required: false
        type: string
      source_sha:
        description: "Exact source commit SHA to build"
        required: false
        type: string
      version:
        description: "Release version without leading v (optional)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-stage-${{ github.event.client_payload.release_tag || inputs.source_tag || 'scheduled' }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  AUTO_DISCOVERY_MIN_SOURCE_TAG: "v0.2.1"

jobs:
  resolve:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO_APP_ID: ${{ secrets.SOURCE_REPO_APP_ID }}
      SOURCE_REPO_APP_PRIVATE_KEY: ${{ secrets.SOURCE_REPO_APP_PRIVATE_KEY }}
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
    outputs:
      should_stage: ${{ steps.params.outputs.should_stage }}
      source_repo: ${{ steps.params.outputs.source_repo }}
      source_repo_name: ${{ steps.params.outputs.source_repo_name }}
      source_tag: ${{ steps.params.outputs.source_tag }}
      source_sha: ${{ steps.params.outputs.source_sha }}
      release_tag: ${{ steps.params.outputs.release_tag }}
      version: ${{ steps.params.outputs.version }}
      channel: ${{ steps.params.outputs.channel }}
    steps:
      - name: Checkout release repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create source repo app token
        id: app-token
        if: ${{ env.SOURCE_REPO_APP_ID != '' && env.SOURCE_REPO_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ env.SOURCE_REPO_APP_ID }}
          private-key: ${{ env.SOURCE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: openelf

      - name: Resolve source discovery token
        id: source-token
        shell: bash
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${SOURCE_REPO_TOKEN}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing SOURCE_REPO_TOKEN or SOURCE_REPO_APP_* secrets"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Resolve release parameters
        id: params
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SOURCE_REPO="${{ github.event.client_payload.source_repo }}"
            SOURCE_TAG="${{ github.event.client_payload.source_tag }}"
            SOURCE_SHA="${{ github.event.client_payload.source_sha }}"
            VERSION_INPUT="${{ github.event.client_payload.version }}"
            SHOULD_STAGE="true"
          else
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.auto_discover }}" = "true" ]; then
              SOURCE_REPO="openelf-labs/openelf"
              MIN_SOURCE_TAG="${AUTO_DISCOVERY_MIN_SOURCE_TAG:-v0.2.1}"
              gh api "repos/${SOURCE_REPO}/tags?per_page=100" > "$RUNNER_TEMP/source-tags.json"
              gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > "$RUNNER_TEMP/releases.json"
              python3 scripts/discover_pending_source_release.py \
                --source-tags-json "$RUNNER_TEMP/source-tags.json" \
                --releases-json "$RUNNER_TEMP/releases.json" \
                --minimum-tag "$MIN_SOURCE_TAG" > "$RUNNER_TEMP/pending.json"

              SHOULD_STAGE="$(python3 -c 'import json, pathlib, sys; print("true" if json.loads(pathlib.Path(sys.argv[1]).read_text()).get("found") else "false")' "$RUNNER_TEMP/pending.json")"
              if [ "$SHOULD_STAGE" = "true" ]; then
                SOURCE_TAG="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text())["source_tag"])' "$RUNNER_TEMP/pending.json")"
                SOURCE_SHA="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text())["source_sha"])' "$RUNNER_TEMP/pending.json")"
                VERSION_INPUT="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text())["version"])' "$RUNNER_TEMP/pending.json")"
              else
                SOURCE_TAG=""
                SOURCE_SHA=""
                VERSION_INPUT=""
              fi
            else
              SOURCE_REPO="${{ inputs.source_repo }}"
              SOURCE_TAG="${{ inputs.source_tag }}"
              SOURCE_SHA="${{ inputs.source_sha }}"
              VERSION_INPUT="${{ inputs.version }}"
              SHOULD_STAGE="true"
            fi
          fi

          if [ "$SHOULD_STAGE" != "true" ]; then
            {
              echo "should_stage=false"
              echo "source_repo=openelf-labs/openelf"
              echo "source_repo_name=openelf"
              echo "source_tag="
              echo "source_sha="
              echo "release_tag="
              echo "version="
              echo "channel="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$SOURCE_REPO" ] || [ -z "$SOURCE_TAG" ] || [ -z "$SOURCE_SHA" ]; then
            echo "Missing required release parameters"
            exit 1
          fi
          if [[ "$SOURCE_TAG" != v* ]]; then
            echo "source_tag must start with v (got: $SOURCE_TAG)"
            exit 1
          fi

          VERSION="${SOURCE_TAG#v}"
          if [ -n "$VERSION_INPUT" ] && [ "$VERSION_INPUT" != "$VERSION" ]; then
            echo "version input ($VERSION_INPUT) must match source_tag ($SOURCE_TAG)"
            exit 1
          fi

          CHANNEL="stable"
          case "$SOURCE_TAG" in
            *alpha*|*beta*|*rc*) CHANNEL="beta" ;;
          esac

          {
            echo "should_stage=true"
            echo "source_repo=$SOURCE_REPO"
            echo "source_repo_name=${SOURCE_REPO##*/}"
            echo "source_tag=$SOURCE_TAG"
            echo "source_sha=$SOURCE_SHA"
            echo "release_tag=$SOURCE_TAG"
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
          } >> "$GITHUB_OUTPUT"

  build-linux-windows:
    needs: resolve
    if: ${{ needs.resolve.outputs.should_stage == 'true' }}
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO_APP_ID: ${{ secrets.SOURCE_REPO_APP_ID }}
      SOURCE_REPO_APP_PRIVATE_KEY: ${{ secrets.SOURCE_REPO_APP_PRIVATE_KEY }}
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Create source repo app token
        id: app-token
        if: ${{ env.SOURCE_REPO_APP_ID != '' && env.SOURCE_REPO_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ env.SOURCE_REPO_APP_ID }}
          private-key: ${{ env.SOURCE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ needs.resolve.outputs.source_repo_name }}

      - name: Resolve source checkout token
        id: checkout-token
        shell: bash
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${SOURCE_REPO_TOKEN}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing SOURCE_REPO_TOKEN or SOURCE_REPO_APP_* secrets"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Checkout private source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ needs.resolve.outputs.source_repo }}
          ref: ${{ needs.resolve.outputs.source_sha }}
          token: ${{ steps.checkout-token.outputs.token }}
          path: source
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify source ref
        shell: bash
        run: |
          cd source
          test "$(git rev-parse HEAD)" = "${{ needs.resolve.outputs.source_sha }}"
          test "$(git rev-list -n1 ${{ needs.resolve.outputs.source_tag }})" = "${{ needs.resolve.outputs.source_sha }}"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: source/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: source/web/package-lock.json

      - name: Build web frontend
        shell: bash
        run: |
          cd source/web
          npm ci
          npm run build

      - name: Build and package
        shell: bash
        run: |
          cd source
          make release-package-platform \
            VERSION="${{ needs.resolve.outputs.version }}" \
            RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}" \
            GOOS="${{ matrix.goos }}" \
            GOARCH="${{ matrix.goarch }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: source/dist/*
          if-no-files-found: error

  build-macos:
    needs: resolve
    if: ${{ needs.resolve.outputs.should_stage == 'true' }}
    runs-on: macos-latest
    environment: release
    env:
      SOURCE_REPO_APP_ID: ${{ secrets.SOURCE_REPO_APP_ID }}
      SOURCE_REPO_APP_PRIVATE_KEY: ${{ secrets.SOURCE_REPO_APP_PRIVATE_KEY }}
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
      MACOS_SIGNING_KEY: ${{ secrets.MACOS_SIGNING_KEY }}
      MACOS_SIGNING_KEY_PASSWORD: ${{ secrets.MACOS_SIGNING_KEY_PASSWORD }}
      APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
      APPLE_ID: ${{ vars.APPLE_ID }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    outputs:
      notarization_required: ${{ steps.mode.outputs.required }}
      notarization_status: ${{ steps.mode.outputs.status }}
      notarization_submission_id: ${{ steps.submit.outputs.submission_id }}
      staged_app_asset: ${{ steps.mode.outputs.staged_app_asset }}
    steps:
      - name: Create source repo app token
        id: app-token
        if: ${{ env.SOURCE_REPO_APP_ID != '' && env.SOURCE_REPO_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ env.SOURCE_REPO_APP_ID }}
          private-key: ${{ env.SOURCE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ needs.resolve.outputs.source_repo_name }}

      - name: Resolve source checkout token
        id: checkout-token
        shell: bash
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${SOURCE_REPO_TOKEN}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing SOURCE_REPO_TOKEN or SOURCE_REPO_APP_* secrets"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Checkout private source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ needs.resolve.outputs.source_repo }}
          ref: ${{ needs.resolve.outputs.source_sha }}
          token: ${{ steps.checkout-token.outputs.token }}
          path: source
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify source ref
        shell: bash
        run: |
          cd source
          test "$(git rev-parse HEAD)" = "${{ needs.resolve.outputs.source_sha }}"
          test "$(git rev-list -n1 ${{ needs.resolve.outputs.source_tag }})" = "${{ needs.resolve.outputs.source_sha }}"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: source/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: source/web/package-lock.json

      - name: Build web frontend
        shell: bash
        run: |
          cd source/web
          npm ci
          npm run build

      - name: Import macOS signing certificate
        if: ${{ env.MACOS_SIGNING_KEY != '' }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "$MACOS_SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$MACOS_SIGNING_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Install create-dmg
        shell: bash
        run: brew install create-dmg

      - name: Build macOS archives
        shell: bash
        run: |
          cd source
          make release-package-platform VERSION="${{ needs.resolve.outputs.version }}" RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}" GOOS=darwin GOARCH=amd64
          make release-package-platform VERSION="${{ needs.resolve.outputs.version }}" RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}" GOOS=darwin GOARCH=arm64
          KEEP_UNIVERSAL_BINARY=1 make release-package-darwin-universal VERSION="${{ needs.resolve.outputs.version }}" RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"

      - name: Build .app bundle
        shell: bash
        run: |
          cd source
          make fetch-apple-tools
          cp dist/openelf ./openelf
          make -C app/macos app APPLE_TOOLS_BINARY=../../build/bin/apple-tools
          rm -f ./openelf dist/openelf

      - name: Codesign .app
        if: ${{ env.APPLE_IDENTITY != '' }}
        shell: bash
        run: |
          BUNDLE="source/app/macos/build/OpenELF.app"
          BUNDLE_ID="ai.openelf.openelf"
          codesign --sign "${APPLE_IDENTITY}" \
            --identifier "${BUNDLE_ID}.cli" \
            --options runtime --timestamp --force \
            "${BUNDLE}/Contents/Resources/openelf"
          if [ -f "${BUNDLE}/Contents/Resources/apple-tools" ]; then
            codesign --sign "${APPLE_IDENTITY}" \
              --identifier "${BUNDLE_ID}.apple-tools" \
              --options runtime --timestamp --force \
              "${BUNDLE}/Contents/Resources/apple-tools"
          fi
          codesign --sign "${APPLE_IDENTITY}" \
            --identifier "${BUNDLE_ID}" \
            --options runtime --timestamp --force \
            "${BUNDLE}/Contents/MacOS/OpenELF"
          codesign --sign "${APPLE_IDENTITY}" \
            --identifier "${BUNDLE_ID}" \
            --options runtime --timestamp --force \
            --entitlements source/app/macos/OpenELF.entitlements \
            "${BUNDLE}"

      - name: Verify codesign
        if: ${{ env.APPLE_IDENTITY != '' }}
        shell: bash
        run: |
          BUNDLE="source/app/macos/build/OpenELF.app"
          codesign --verify --strict --verbose=2 "$BUNDLE"

      - name: Determine macOS release mode
        id: mode
        shell: bash
        run: |
          STAGED_APP_ASSET="OpenELF-${{ needs.resolve.outputs.version }}-macos-staged-app.zip"
          if [ -n "$APPLE_IDENTITY" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
            echo "status=pending" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          fi
          echo "staged_app_asset=$STAGED_APP_ASSET" >> "$GITHUB_OUTPUT"

      - name: Submit notarization asynchronously
        id: submit
        if: ${{ steps.mode.outputs.required == 'true' }}
        shell: bash
        run: |
          APP_ZIP="source/dist/${{ steps.mode.outputs.staged_app_asset }}"
          ditto -c -k --keepParent source/app/macos/build/OpenELF.app "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json > "$RUNNER_TEMP/notary-submit.json"
          python3 - "$RUNNER_TEMP/notary-submit.json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          submission_id = str(payload.get("id") or "").strip()
          if not submission_id:
              raise SystemExit("Missing notarization submission id")
          with open(sys.argv[2], "a", encoding="utf-8") as fh:
              fh.write(f"submission_id={submission_id}\n")
          PY

      - name: Create final macOS archives without notarization
        if: ${{ steps.mode.outputs.required != 'true' }}
        shell: bash
        run: |
          create-dmg \
            --volname "OpenELF" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "OpenELF.app" 180 190 \
            --hide-extension "OpenELF.app" \
            --app-drop-link 480 190 \
            --no-internet-enable \
            "source/dist/OpenELF-${{ needs.resolve.outputs.version }}.dmg" \
            "source/app/macos/build/OpenELF.app" \
            || true
          if [ -n "$APPLE_IDENTITY" ]; then
            codesign --sign "${APPLE_IDENTITY}" --timestamp --force \
              "source/dist/OpenELF-${{ needs.resolve.outputs.version }}.dmg"
            codesign --verify --strict "source/dist/OpenELF-${{ needs.resolve.outputs.version }}.dmg"
          fi
          ditto -c -k --keepParent source/app/macos/build/OpenELF.app source/dist/OpenELF-darwin.zip

      - name: Upload staged macOS artifacts
        if: ${{ steps.mode.outputs.required == 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: binaries-darwin
          path: |
            source/dist/*.tar.gz
            source/dist/${{ steps.mode.outputs.staged_app_asset }}
          if-no-files-found: error

      - name: Upload final macOS artifacts
        if: ${{ steps.mode.outputs.required != 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: binaries-darwin
          path: source/dist/*
          if-no-files-found: error

  stage-release:
    needs:
      - resolve
      - build-linux-windows
      - build-macos
    if: ${{ needs.resolve.outputs.should_stage == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    env:
      SOURCE_REPO_APP_ID: ${{ secrets.SOURCE_REPO_APP_ID }}
      SOURCE_REPO_APP_PRIVATE_KEY: ${{ secrets.SOURCE_REPO_APP_PRIVATE_KEY }}
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Create source repo app token
        id: app-token
        if: ${{ env.SOURCE_REPO_APP_ID != '' && env.SOURCE_REPO_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ env.SOURCE_REPO_APP_ID }}
          private-key: ${{ env.SOURCE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ needs.resolve.outputs.source_repo_name }}

      - name: Resolve source checkout token
        id: checkout-token
        shell: bash
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${SOURCE_REPO_TOKEN}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing SOURCE_REPO_TOKEN or SOURCE_REPO_APP_* secrets"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Checkout private source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ needs.resolve.outputs.source_repo }}
          ref: ${{ needs.resolve.outputs.source_sha }}
          token: ${{ steps.checkout-token.outputs.token }}
          path: source
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify source ref
        shell: bash
        run: |
          cd source
          test "$(git rev-parse HEAD)" = "${{ needs.resolve.outputs.source_sha }}"
          test "$(git rev-list -n1 ${{ needs.resolve.outputs.source_tag }})" = "${{ needs.resolve.outputs.source_sha }}"

      - name: Download staged build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          path: staging
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: |
          mkdir -p source/dist
          cd source
          make release-notes \
            VERSION="${{ needs.resolve.outputs.version }}" \
            RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"

      - name: Create or validate draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          PRERELEASE_FLAG=()
          if [ "${{ needs.resolve.outputs.channel }}" = "beta" ]; then
            PRERELEASE_FLAG+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" --json isDraft >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft')"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release ${RELEASE_TAG} already exists and is not a draft"
              exit 1
            fi
            gh release edit "$RELEASE_TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --title "OpenELF ${VERSION}" \
              --notes-file source/dist/changelog.txt \
              "${PRERELEASE_FLAG[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --draft \
              --title "OpenELF ${VERSION}" \
              --notes-file source/dist/changelog.txt \
              "${PRERELEASE_FLAG[@]}"
          fi

      - name: Write release state
        shell: bash
        run: |
          python3 - <<'PY' > staging/release-state.json
          import json
          import os
          from datetime import datetime, timezone

          def iso_now() -> str:
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          payload = {
              "schema_version": 1,
              "release_tag": os.environ["RELEASE_TAG"],
              "version": os.environ["VERSION"],
              "channel": os.environ["CHANNEL"],
              "source_repo": os.environ["SOURCE_REPO"],
              "source_tag": os.environ["SOURCE_TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "staged_at": iso_now(),
              "finalized_at": None,
              "notarization": {
                  "required": os.environ["NOTARIZATION_REQUIRED"] == "true",
                  "status": os.environ["NOTARIZATION_STATUS"],
                  "submission_id": os.environ["NOTARIZATION_SUBMISSION_ID"],
                  "staged_app_asset": os.environ["STAGED_APP_ASSET"],
                  "last_checked_at": None,
              },
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          VERSION: ${{ needs.resolve.outputs.version }}
          CHANNEL: ${{ needs.resolve.outputs.channel }}
          SOURCE_REPO: ${{ needs.resolve.outputs.source_repo }}
          SOURCE_TAG: ${{ needs.resolve.outputs.source_tag }}
          SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
          NOTARIZATION_REQUIRED: ${{ needs.build-macos.outputs.notarization_required }}
          NOTARIZATION_STATUS: ${{ needs.build-macos.outputs.notarization_status }}
          NOTARIZATION_SUBMISSION_ID: ${{ needs.build-macos.outputs.notarization_submission_id }}
          STAGED_APP_ASSET: ${{ needs.build-macos.outputs.staged_app_asset }}

      - name: Upload staged assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"
          mapfile -t UPLOAD_FILES < <(find staging -maxdepth 1 -type f | sort)
          if [ "${#UPLOAD_FILES[@]}" -eq 0 ]; then
            echo "No staged release assets found"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "${UPLOAD_FILES[@]}"
