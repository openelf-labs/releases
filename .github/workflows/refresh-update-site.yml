name: Refresh Update Site

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Private source repository that owns install.sh and site template"
        required: false
        default: "openelf-labs/openelf"
        type: string
      source_ref:
        description: "Source ref to use for install.sh and page template"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

env:
  UPDATE_SITE_DOMAIN: "update.openelf.ai"

jobs:
  build-site:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO_APP_ID: ${{ secrets.SOURCE_REPO_APP_ID }}
      SOURCE_REPO_APP_PRIVATE_KEY: ${{ secrets.SOURCE_REPO_APP_PRIVATE_KEY }}
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
    permissions:
      contents: read
    steps:
      - name: Create source repo app token
        id: app-token
        if: ${{ env.SOURCE_REPO_APP_ID != '' && env.SOURCE_REPO_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ env.SOURCE_REPO_APP_ID }}
          private-key: ${{ env.SOURCE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: openelf

      - name: Resolve source checkout token
        id: checkout-token
        shell: bash
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${SOURCE_REPO_TOKEN}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing SOURCE_REPO_TOKEN or SOURCE_REPO_APP_* secrets"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Checkout private source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          token: ${{ steps.checkout-token.outputs.token }}
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve stable and beta aliases
        id: aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          RELEASES_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100")"
          printf '%s' "$RELEASES_JSON" > "$RUNNER_TEMP/releases.json"
          python3 - "$RUNNER_TEMP/releases.json" "$RUNNER_TEMP/aliases.json" <<'PY'
          import json
          import pathlib
          import re
          import sys

          def semver_key(tag_name: str):
              tag = tag_name.lstrip("v")
              core, _, pre = tag.partition("-")
              major, minor, patch = (core.split(".") + ["0", "0", "0"])[:3]
              pre_parts = []
              if pre:
                  for chunk in re.split(r"[.\-]", pre):
                      if chunk.isdigit():
                          pre_parts.append((0, int(chunk)))
                      else:
                          pre_parts.append((1, chunk))
              return (int(major), int(minor), int(patch), tuple(pre_parts))

          releases = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          stable_tags = []
          beta_tags = []

          for release in releases:
              if release.get("draft"):
                  continue
              tag_name = str(release.get("tag_name") or "")
              if not tag_name:
                  continue
              if release.get("prerelease"):
                  beta_tags.append(tag_name)
              else:
                  stable_tags.append(tag_name)

          payload = {
              "stable": sorted(stable_tags, key=semver_key, reverse=True)[0] if stable_tags else None,
              "beta": sorted(beta_tags, key=semver_key, reverse=True)[0] if beta_tags else None,
          }
          pathlib.Path(sys.argv[2]).write_text(json.dumps(payload), encoding="utf-8")
          PY

          STABLE_TAG="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text()).get("stable") or "")' "$RUNNER_TEMP/aliases.json")"
          BETA_TAG="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text()).get("beta") or "")' "$RUNNER_TEMP/aliases.json")"

          if [ -z "$STABLE_TAG" ]; then
            echo "No stable release exists yet."
            exit 1
          fi

          echo "stable_tag=$STABLE_TAG" >> "$GITHUB_OUTPUT"
          echo "beta_tag=$BETA_TAG" >> "$GITHUB_OUTPUT"

      - name: Download stable and beta manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p manifests/stable manifests/beta
          gh release download "${{ steps.aliases.outputs.stable_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern manifest.json \
            --dir manifests/stable \
            --clobber
          if [ -n "${{ steps.aliases.outputs.beta_tag }}" ]; then
            gh release download "${{ steps.aliases.outputs.beta_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern manifest.json \
              --dir manifests/beta \
              --clobber
          fi

      - name: Build update site
        shell: bash
        run: |
          SITE_ARGS=(
            --output-dir site
            --install-script source/scripts/install.sh
            --stable-manifest manifests/stable/manifest.json
            --custom-domain "${UPDATE_SITE_DOMAIN}"
            --releases-url "https://github.com/${GITHUB_REPOSITORY}/releases"
          )
          if [ -f manifests/beta/manifest.json ]; then
            SITE_ARGS+=(--beta-manifest manifests/beta/manifest.json)
          fi
          python3 source/scripts/build_update_site.py "${SITE_ARGS[@]}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

  deploy-pages:
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
