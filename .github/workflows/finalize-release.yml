name: Finalize Release

on:
  workflow_run:
    workflows:
      - Stage Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Draft release tag to finalize"
        required: false
        type: string
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

concurrency:
  group: release-finalize
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  UPDATE_SITE_DOMAIN: "update.openelf.ai"

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_release: ${{ steps.state.outputs.has_release }}
      source_repo: ${{ steps.state.outputs.source_repo }}
      source_repo_name: ${{ steps.state.outputs.source_repo_name }}
      source_tag: ${{ steps.state.outputs.source_tag }}
      source_sha: ${{ steps.state.outputs.source_sha }}
      release_tag: ${{ steps.state.outputs.release_tag }}
      version: ${{ steps.state.outputs.version }}
      channel: ${{ steps.state.outputs.channel }}
      notarization_required: ${{ steps.state.outputs.notarization_required }}
      notarization_status: ${{ steps.state.outputs.notarization_status }}
      notarization_submission_id: ${{ steps.state.outputs.notarization_submission_id }}
      staged_app_asset: ${{ steps.state.outputs.staged_app_asset }}
    steps:
      - name: Checkout release repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select draft release
        id: candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REQUESTED_TAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REQUESTED_TAG="${{ inputs.release_tag }}"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > "$RUNNER_TEMP/releases.json"
          if [ -n "$REQUESTED_TAG" ]; then
            python3 scripts/select_draft_release.py \
              --releases-json "$RUNNER_TEMP/releases.json" \
              --release-tag "$REQUESTED_TAG" > "$RUNNER_TEMP/selected.json"
          else
            python3 scripts/select_draft_release.py \
              --releases-json "$RUNNER_TEMP/releases.json" > "$RUNNER_TEMP/selected.json"
          fi

          FOUND="$(python3 -c 'import json, pathlib, sys; print("true" if json.loads(pathlib.Path(sys.argv[1]).read_text()).get("found") else "false")' "$RUNNER_TEMP/selected.json")"
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"
          if [ "$FOUND" != "true" ]; then
            exit 0
          fi

          RELEASE_TAG="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text())["tag_name"])' "$RUNNER_TEMP/selected.json")"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download release state
        if: ${{ steps.candidate.outputs.found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download "${{ steps.candidate.outputs.release_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern release-state.json \
            --dir "$RUNNER_TEMP" \
            --clobber

      - name: Resolve state payload
        id: state
        shell: bash
        run: |
          if [ "${{ steps.candidate.outputs.found }}" != "true" ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - "$RUNNER_TEMP/release-state.json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          notarization = payload.get("notarization") or {}
          status = str(notarization.get("status") or "")

          if status == "rejected":
              with open(sys.argv[2], "a", encoding="utf-8") as fh:
                  fh.write("has_release=false\n")
              raise SystemExit(0)

          outputs = {
              "has_release": "true",
              "source_repo": str(payload.get("source_repo") or ""),
              "source_repo_name": str(payload.get("source_repo") or "").split("/")[-1],
              "source_tag": str(payload.get("source_tag") or ""),
              "source_sha": str(payload.get("source_sha") or ""),
              "release_tag": str(payload.get("release_tag") or ""),
              "version": str(payload.get("version") or ""),
              "channel": str(payload.get("channel") or "stable"),
              "notarization_required": "true" if notarization.get("required") else "false",
              "notarization_status": status,
              "notarization_submission_id": str(notarization.get("submission_id") or ""),
              "staged_app_asset": str(notarization.get("staged_app_asset") or ""),
          }

          with open(sys.argv[2], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")
          PY

  finalize-macos:
    needs: resolve
    if: ${{ needs.resolve.outputs.has_release == 'true' && needs.resolve.outputs.notarization_required == 'true' }}
    runs-on: macos-latest
    environment: release
    permissions:
      contents: write
    env:
      APPLE_ID: ${{ vars.APPLE_ID }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
      MACOS_SIGNING_KEY: ${{ secrets.MACOS_SIGNING_KEY }}
      MACOS_SIGNING_KEY_PASSWORD: ${{ secrets.MACOS_SIGNING_KEY_PASSWORD }}
    outputs:
      ready_to_publish: ${{ steps.finalize.outputs.ready_to_publish }}
    steps:
      - name: Import macOS signing certificate
        if: ${{ env.MACOS_SIGNING_KEY != '' }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "$MACOS_SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$MACOS_SIGNING_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Install create-dmg
        shell: bash
        run: brew install create-dmg

      - name: Check notarization status and build final macOS assets
        id: finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          SUBMISSION_ID="${{ needs.resolve.outputs.notarization_submission_id }}"
          STAGED_APP_ASSET="${{ needs.resolve.outputs.staged_app_asset }}"

          mkdir -p work dist
          gh release download "$RELEASE_TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern release-state.json \
            --dir work \
            --clobber

          update_state() {
            local status="$1"
            python3 - "work/release-state.json" "$status" <<'PY'
            import json
            import pathlib
            import sys
            from datetime import datetime, timezone

            state_path = pathlib.Path(sys.argv[1])
            status = sys.argv[2]
            payload = json.loads(state_path.read_text(encoding="utf-8"))
            payload.setdefault("notarization", {})
            payload["notarization"]["status"] = status
            payload["notarization"]["last_checked_at"] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
            state_path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
            PY
            gh release upload "$RELEASE_TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              work/release-state.json
          }

          STATUS="${{ needs.resolve.outputs.notarization_status }}"
          if [ "$STATUS" != "accepted" ]; then
            xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json > "$RUNNER_TEMP/notary-info.json"
            STATUS="$(python3 -c 'import json, pathlib, sys; print(str(json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")).get("status") or "").strip())' "$RUNNER_TEMP/notary-info.json")"
          fi

          STATUS_LOWER="$(printf '%s' "$STATUS" | tr '[:upper:]' '[:lower:]')"
          case "$STATUS_LOWER" in
            accepted)
              gh release download "$RELEASE_TAG" \
                --repo "${GITHUB_REPOSITORY}" \
                --pattern "$STAGED_APP_ASSET" \
                --dir work \
                --clobber
              ditto -x -k "work/$STAGED_APP_ASSET" work
              APP_PATH="work/OpenELF.app"
              xcrun stapler staple "$APP_PATH"
              create-dmg \
                --volname "OpenELF" \
                --window-pos 200 120 \
                --window-size 660 400 \
                --icon-size 128 \
                --icon "OpenELF.app" 180 190 \
                --hide-extension "OpenELF.app" \
                --app-drop-link 480 190 \
                --no-internet-enable \
                "dist/OpenELF-${VERSION}.dmg" \
                "$APP_PATH" \
                || true
              if [ -n "$APPLE_IDENTITY" ]; then
                codesign --sign "${APPLE_IDENTITY}" --timestamp --force "dist/OpenELF-${VERSION}.dmg"
                codesign --verify --strict "dist/OpenELF-${VERSION}.dmg"
              fi
              ditto -c -k --keepParent "$APP_PATH" "dist/OpenELF-darwin.zip"
              gh release upload "$RELEASE_TAG" \
                --repo "${GITHUB_REPOSITORY}" \
                --clobber \
                "dist/OpenELF-${VERSION}.dmg" \
                "dist/OpenELF-darwin.zip"
              update_state accepted
              echo "ready_to_publish=true" >> "$GITHUB_OUTPUT"
              ;;
            invalid|rejected)
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                || true
              update_state rejected
              echo "ready_to_publish=false" >> "$GITHUB_OUTPUT"
              exit 1
              ;;
            *)
              update_state pending
              echo "ready_to_publish=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  publish:
    needs:
      - resolve
      - finalize-macos
    if: ${{ needs.resolve.outputs.has_release == 'true' && (needs.resolve.outputs.notarization_required != 'true' || needs.finalize-macos.outputs.ready_to_publish == 'true') }}
    runs-on: ubuntu-latest
    environment: release
    env:
      SOURCE_REPO_APP_ID: ${{ secrets.SOURCE_REPO_APP_ID }}
      SOURCE_REPO_APP_PRIVATE_KEY: ${{ secrets.SOURCE_REPO_APP_PRIVATE_KEY }}
      SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Create source repo app token
        id: app-token
        if: ${{ env.SOURCE_REPO_APP_ID != '' && env.SOURCE_REPO_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ env.SOURCE_REPO_APP_ID }}
          private-key: ${{ env.SOURCE_REPO_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ needs.resolve.outputs.source_repo_name }}

      - name: Resolve source checkout token
        id: checkout-token
        shell: bash
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${SOURCE_REPO_TOKEN}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "Missing SOURCE_REPO_TOKEN or SOURCE_REPO_APP_* secrets"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Checkout private source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ needs.resolve.outputs.source_repo }}
          ref: ${{ needs.resolve.outputs.source_sha }}
          token: ${{ steps.checkout-token.outputs.token }}
          path: source
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify source ref
        shell: bash
        run: |
          cd source
          test "$(git rev-parse HEAD)" = "${{ needs.resolve.outputs.source_sha }}"
          test "$(git rev-list -n1 ${{ needs.resolve.outputs.source_tag }})" = "${{ needs.resolve.outputs.source_sha }}"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: source/go.mod

      - name: Download staged release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p source/dist
          gh release download "${{ needs.resolve.outputs.release_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir source/dist \
            --clobber
          rm -f source/dist/release-state.json
          if [ -n "${{ needs.resolve.outputs.staged_app_asset }}" ]; then
            rm -f "source/dist/${{ needs.resolve.outputs.staged_app_asset }}"
          fi

      - name: Generate checksums and release notes
        shell: bash
        run: |
          cd source
          make release-checksums release-notes \
            VERSION="${{ needs.resolve.outputs.version }}" \
            RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"

      - name: Sign artifacts and manifest
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        shell: bash
        run: |
          cd source
          if [ -n "$SIGNING_PRIVATE_KEY" ]; then
            make release-sign \
              VERSION="${{ needs.resolve.outputs.version }}" \
              RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"
          else
            make release-manifest \
              VERSION="${{ needs.resolve.outputs.version }}" \
              RELEASE_TAG="${{ needs.resolve.outputs.release_tag }}"
          fi

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd source
          gh release upload "${{ needs.resolve.outputs.release_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            dist/checksums.txt \
            dist/manifest.json

      - name: Remove draft-only assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release delete-asset "${{ needs.resolve.outputs.release_tag }}" \
            release-state.json \
            --repo "${GITHUB_REPOSITORY}" \
            --yes || true
          if [ -n "${{ needs.resolve.outputs.staged_app_asset }}" ]; then
            gh release delete-asset "${{ needs.resolve.outputs.release_tag }}" \
              "${{ needs.resolve.outputs.staged_app_asset }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes || true
          fi

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PRERELEASE_FLAG=()
          if [ "${{ needs.resolve.outputs.channel }}" = "beta" ]; then
            PRERELEASE_FLAG+=(--prerelease)
          fi
          gh release edit "${{ needs.resolve.outputs.release_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --title "OpenELF ${{ needs.resolve.outputs.version }}" \
            --notes-file source/dist/changelog.txt \
            "${PRERELEASE_FLAG[@]}"

      - name: Resolve stable and beta aliases
        id: aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          RELEASES_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100")"
          printf '%s' "$RELEASES_JSON" > "$RUNNER_TEMP/releases.json"
          python3 - "$RUNNER_TEMP/releases.json" "$RUNNER_TEMP/aliases.json" <<'PY'
          import json
          import pathlib
          import re
          import sys

          def semver_key(tag_name: str):
              tag = tag_name.lstrip("v")
              core, _, pre = tag.partition("-")
              major, minor, patch = (core.split(".") + ["0", "0", "0"])[:3]
              pre_parts = []
              if pre:
                  for chunk in re.split(r"[.\-]", pre):
                      if chunk.isdigit():
                          pre_parts.append((0, int(chunk)))
                      else:
                          pre_parts.append((1, chunk))
              return (int(major), int(minor), int(patch), tuple(pre_parts))

          releases = json.loads(pathlib.Path(sys.argv[1]).read_text())
          stable_tags = []
          beta_tags = []

          for release in releases:
              if release.get("draft"):
                  continue
              tag_name = release.get("tag_name")
              if not tag_name:
                  continue
              if release.get("prerelease"):
                  beta_tags.append(tag_name)
              else:
                  stable_tags.append(tag_name)

          payload = {
              "stable": sorted(stable_tags, key=semver_key, reverse=True)[0] if stable_tags else None,
              "beta": sorted(beta_tags, key=semver_key, reverse=True)[0] if beta_tags else None,
          }
          pathlib.Path(sys.argv[2]).write_text(json.dumps(payload), encoding="utf-8")
          PY

          STABLE_TAG="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text()).get("stable") or "")' "$RUNNER_TEMP/aliases.json")"
          BETA_TAG="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text()).get("beta") or "")' "$RUNNER_TEMP/aliases.json")"

          if [ -z "$STABLE_TAG" ]; then
            echo "No stable release exists yet. Publish a stable tag before deploying update aliases."
            exit 1
          fi

          echo "stable_tag=$STABLE_TAG" >> "$GITHUB_OUTPUT"
          echo "beta_tag=$BETA_TAG" >> "$GITHUB_OUTPUT"

      - name: Download stable and beta manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p manifests/stable manifests/beta
          gh release download "${{ steps.aliases.outputs.stable_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern manifest.json \
            --dir manifests/stable \
            --clobber
          if [ -n "${{ steps.aliases.outputs.beta_tag }}" ]; then
            gh release download "${{ steps.aliases.outputs.beta_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern manifest.json \
              --dir manifests/beta \
              --clobber
          fi

      - name: Build update site
        shell: bash
        run: |
          SITE_ARGS=(
            --output-dir site
            --install-script source/scripts/install.sh
            --stable-manifest manifests/stable/manifest.json
            --custom-domain "${UPDATE_SITE_DOMAIN}"
            --releases-url "https://github.com/${GITHUB_REPOSITORY}/releases"
          )
          if [ -f manifests/beta/manifest.json ]; then
            SITE_ARGS+=(--beta-manifest manifests/beta/manifest.json)
          fi
          python3 source/scripts/build_update_site.py "${SITE_ARGS[@]}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
